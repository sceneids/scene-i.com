<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>alt2</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
        }

        body {
            display: grid;
            min-height: 100vh;
            place-items: center;
            background: #fff;
            color: #000;
            font-family: "Times New Roman", Times, serif;
            font-weight: 300;
        }

        img {
            display: block;
            width: auto;
            height: auto;
            max-width: 100vw;
            max-height: 100vh;
            object-fit: contain;
        }

        a {
            position: fixed;
            top: 50%;
            left: 50%;
            color: #000;
            z-index: 10;
            font-size: 18px;
            line-height: 1;
            text-decoration: none;
            text-transform: lowercase;
            transform: translate(-50%, -50%);
        }

        a:hover,
        a:focus-visible {
            color: #fff;
            background: #000;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <a href="index.html">i</a>
    <img src="restassured.png" alt="restassured" />
</body>
</html>
