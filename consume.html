<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>consume</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
        }

        body {
            min-height: 100vh;
            background: #fff;
            color: #000;
            font-family: "Times New Roman", Times, serif;
        }

        main {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 24px;
            text-align: center;
        }

        .home-link {
            color: inherit;
            font-size: 20px;
            line-height: 1;
            text-decoration: none;
        }

        .home-link:hover,
        .home-link:focus-visible {
            color: #fff;
            background: #000;
            text-decoration: none;
        }

        .home-link:focus-visible {
            outline: 1px solid #000;
            outline-offset: 4px;
        }

        p {
            max-width: 560px;
            margin: 0;
            font-size: clamp(14px, 1.4vw, 18px);
            line-height: 1.35;
        }
    </style>
</head>
<body>
    <main>
        <a class="home-link" href="index.html" aria-label="Return to home page">i</a>
        <p>There is nothing to consume yet from i, future items will be listed here</p>
    </main>
</body>
</html>
