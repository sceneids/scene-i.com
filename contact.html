<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>contact</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
        }

        body {
            background: #fff;
            color: #000;
            font-family: Arial, "Helvetica Neue", Helvetica, sans-serif;
        }

        main {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            text-align: center;
        }

        p {
            max-width: 560px;
            margin: 0;
            font-size: clamp(16px, 2.3vw, 24px);
            line-height: 1.35;
            text-transform: lowercase;
        }
    </style>
</head>
<body>
    <main>
        <p>if you wish to contact i, please email indistinctscene@gmail.com.</p>
    </main>
</body>
</html>
