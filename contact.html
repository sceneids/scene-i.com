<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>contact</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
        }

        body {
            background: #fff;
            color: #000;
            font-family: "Times New Roman", Times, serif;
            font-weight: 300;
        }

        .site-home-i {
            position: fixed;
            left: 50%;
            top: 50%;
            z-index: 10;
            color: #000;
            font-size: 18px;
            line-height: 1;
            text-decoration: none;
            text-transform: lowercase;
            transform: translate(-50%, -50%);
        }

        .site-home-i:hover,
        .site-home-i:focus-visible {
            color: #fff;
            background: #6f2dbd;
            text-decoration: none;
        }

        main {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            text-align: center;
        }

        p {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-width: 240px;
            margin: 0;
            font-size: clamp(11px, 1.1vw, 14px);
            line-height: 1.2;
            text-transform: lowercase;
        }
    </style>
</head>
<body>
    <a class="site-home-i" href="index.html">i</a>

    <main>
        <p>
            <span>if you wish to contact i,</span>
            <span>please email</span>
            <span>indistinctscene@gmail.com.</span>
        </p>
    </main>
</body>
</html>
