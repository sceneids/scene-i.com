<!DOCTYPE html>

  <title>Gallery</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background-color: #ffffff;
      color: #000000;
      min-height: 100vh;
      text-transform: uppercase;
    }

    .back-home {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Times New Roman', Times, serif;
      font-style: italic;
      font-size: 24px;
      color: #000000;
      text-decoration: none;
      z-index: 9999;
    }

    .gallery-container {
      width: 100%;
      max-width: 900px;
      margin: 60px auto 0 auto;
      padding: 40px 20px;
    }

    .photo-item {
      width: 100%;
      max-width: 850px;
      margin: 0 0 60px 40px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .photo-item img {
      width: 100%;
      height: auto;
      display: block;
      border: none;
      box-shadow: none;
      opacity: 1;
    }

    .photo-description {
      font-family: 'Times New Roman', Times, serif;
      font-size: 12px;
      color: #333333;
      margin-top: 6px;
      padding: 0;
      line-height: 1.4;
      text-transform: none;
      width: 100%;
      min-height: 18px;
      outline: none;
    }

    .photo-description[contenteditable=\"true\"]:empty::before {
      content: \"location / date / names\";
      color: #999999;
      pointer-events: none;
    }
  </style>
</head>
