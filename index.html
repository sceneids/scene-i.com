<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>scene i</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
        }

        body {
            overflow: hidden;
            background: #fff;
            color: #000;
            font-family: "Times New Roman", Times, serif;
        }

        .home-mark {
            position: fixed;
            inset: 0;
            display: grid;
            place-items: center;
        }

        .center-i {
            color: #000;
            display: grid;
            place-items: center;
            width: 44px;
            height: 44px;
            font-size: 34px;
            font-weight: 400;
            line-height: 1;
            text-decoration: none;
            text-transform: lowercase;
        }

        .center-i:focus-visible,
        .orbit-link:focus-visible {
            outline: 1px solid #000;
            outline-offset: 4px;
        }

        .orbit-item {
            --radius: clamp(92px, 16vw, 148px);
            --duration: 18s;
            --delay: 0s;
            position: fixed;
            left: 50%;
            top: 50%;
            width: 0;
            height: 0;
            animation: orbit var(--duration) linear infinite;
            animation-delay: var(--delay);
            transform-origin: 0 0;
        }

        .orbit-link {
            display: inline-block;
            color: #000;
            font-size: clamp(14px, 1.35vw, 17px);
            font-weight: 400;
            line-height: 1;
            text-decoration: none;
            text-transform: lowercase;
            white-space: nowrap;
            animation: counter-orbit var(--duration) linear infinite;
            animation-delay: var(--delay);
            transform: translateX(var(--radius)) rotate(0deg);
        }

        .orbit-link:hover,
        .orbit-link:focus-visible {
            text-decoration: underline;
        }

        body:has(.orbit-item:hover, .orbit-item:focus-within) .orbit-item,
        body:has(.orbit-item:hover, .orbit-item:focus-within) .orbit-link {
            animation-play-state: paused;
        }

        @keyframes orbit {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        @keyframes counter-orbit {
            from {
                transform: translateX(var(--radius)) rotate(0deg);
            }

            to {
                transform: translateX(var(--radius)) rotate(-360deg);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .orbit-item,
            .orbit-link {
                animation: none;
            }

            .orbit-item.mixes {
                transform: rotate(0deg);
            }

            .orbit-item.consume {
                transform: rotate(120deg);
            }

            .orbit-item.contact {
                transform: rotate(240deg);
            }
        }
    </style>
</head>
<body>
    <main class="home-mark" aria-label="scene i">
        <a class="center-i" href="index.html">i</a>
    </main>

    <div class="orbit-item mixes">
        <a class="orbit-link" href="mixes.html">mixes</a>
    </div>

    <div class="orbit-item consume" style="--delay: -6s;">
        <a class="orbit-link" href="./consume-new.html">consume</a>
    </div>

    <div class="orbit-item contact" style="--delay: -12s;">
        <a class="orbit-link" href="contact.html">contact</a>
    </div>
</body>
</html>
