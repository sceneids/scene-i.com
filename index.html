<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>INDISTINCT SCENE</title>
    <style>
                * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background: #ffffff;
            color: #000000;
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* ── LEFT: scrollable photo column ── */
        .photo-pane {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0;
            scrollbar-width: none;
        }

        .photo-pane::-webkit-scrollbar {
            display: none;
        }

        .photo-item {
            width: 100%;
            max-width: 850px;
            margin-left: 40px;
            flex-shrink: 0;
        }

        .photo-item img {
            width: 100%;
            display: block;
        }

        /* ── RIGHT: sidebar ── */
        .sidebar {
            width: 220px;
            min-width: 220px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 28px 20px 20px 20px;
            background: #ffffff;
            position: relative;
        }

        /* Site title */
        .site-title {
            font-family: 'Courier New', Courier, monospace;
            font-size: 10px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            font-weight: normal;
            line-height: 1.6;
            margin-bottom: 18px;
        }

        /* Nav links */
        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 0;
            margin-bottom: 28px;
        }

        .sidebar-nav a {
            font-family: 'Courier New', Courier, monospace;
            font-size: 10px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            text-decoration: none;
            color: #000;
            line-height: 1.9;
            font-weight: normal;
        }

        .sidebar-nav a:hover {
            opacity: 0.5;
        }

        /* ── Liquid Glass Calendar ── */
        .calendar {
            margin-top: auto;
            margin-bottom: auto;
        }

        .cal-widget {
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.75);
            border-radius: 18px;
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.10),
                0 1.5px 0 rgba(255,255,255,0.85) inset,
                0 -1px 0 rgba(0,0,0,0.05) inset;
            padding: 14px 12px 12px 12px;
            overflow: hidden;
        }

        .cal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            user-select: none;
        }

        .cal-header button {
            background: rgba(0,0,0,0.06);
            border: none;
            cursor: pointer;
            font-size: 11px;
            color: #1d1d1f;
            padding: 3px 7px;
            border-radius: 8px;
            line-height: 1.4;
            transition: background 0.15s;
            font-family: 'Courier New', Courier, monospace;
        }

        .cal-header button:hover {
            background: rgba(0,0,0,0.12);
        }

        .cal-header .cal-label {
            font-family: 'Courier New', Courier, monospace;
            font-size: 11px;
            font-weight: normal;
            letter-spacing: 0.04em;
            color: #1d1d1f;
        }

        /* Day-of-week row */
        .cal-dow {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            margin-bottom: 4px;
        }

        .cal-dow-cell {
            font-family: 'Courier New', Courier, monospace;
            font-size: 8px;
            text-align: center;
            color: rgba(0,0,0,0.38);
            letter-spacing: 0.04em;
            padding-bottom: 2px;
        }

        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 0;
        }

        .cal-cell {
            font-family: 'Courier New', Courier, monospace;
            font-size: 10px;
            text-align: center;
            padding: 3px 0;
            cursor: default;
            color: #1d1d1f;
            letter-spacing: 0em;
            line-height: 1;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.1s;
        }

        .cal-cell.today {
            background: #007aff;
            color: #ffffff;
            font-weight: normal;
            border-radius: 50%;
        }

        .cal-cell.empty {
            color: transparent;
            pointer-events: none;
        }

        .cal-cell.other-month {
            color: rgba(0,0,0,0.2);
        }

        /* Bottom date label */
        .date-label {
            margin-top: auto;
            font-family: 'Philo', Arial, sans-serif;
            font-size: 10px;
            letter-spacing: 0.04em;
            color: #000;
            padding-top: 20px;
        }
    </style>
</head>
<body>

    <!-- Left: all photos -->
    <div class="photo-pane" id="photo-pane">
        <!-- photos injected by JS -->
    </div>

    <!-- Right: sidebar -->
    <div class="sidebar">

        <div class="site-title">
            INDISTINCT SCENE
        </div>

        <nav class="sidebar-nav">
            <a href="index.html">DIARY</a>
            <a href="mixes.html">MIXES</a>
            <a href="gallery.html">GALLERY</a>
        </nav>

        <div class="calendar">
            <div class="cal-widget">
                <div class="cal-header">
                    <button id="cal-prev">&#8249;</button>
                    <span class="cal-label" id="cal-label"></span>
                    <button id="cal-next">&#8250;</button>
                </div>
                <div class="cal-dow">
                    <div class="cal-dow-cell">M</div>
                    <div class="cal-dow-cell">T</div>
                    <div class="cal-dow-cell">W</div>
                    <div class="cal-dow-cell">T</div>
                    <div class="cal-dow-cell">F</div>
                    <div class="cal-dow-cell">S</div>
                    <div class="cal-dow-cell">S</div>
                </div>
                <div class="cal-grid" id="cal-grid"></div>
            </div>
        </div>

        <div class="date-label" id="date-label"></div>

    </div>

    <script>
        // All photos — shown always, regardless of date
        const allPhotos = [
            "Abuelas photos/000000010004.jpg",
            "Abuelas photos/000000010013.jpg",
            "Abuelas photos/000000010015.jpg",
            "Abuelas photos/000000010016.jpg",
            "Abuelas photos/000000030030.jpg",
            "Abuelas photos/000000060009.jpg",
            "Abuelas photos/000000060025.jpg",
        ];

        // Render all photos
        const pane = document.getElementById('photo-pane');
        allPhotos.forEach(src => {
            const wrap = document.createElement('div');
            wrap.className = 'photo-item';
            const img = document.createElement('img');
            img.src = src;
            img.alt = '';
            wrap.appendChild(img);
            pane.appendChild(wrap);
        });

        // Show today's date in bottom label
        const today = new Date();
        const pad = n => String(n).padStart(2, '0');
        const todayStr = today.getFullYear() + '-' + pad(today.getMonth() + 1) + '-' + pad(today.getDate());
        document.getElementById('date-label').textContent = todayStr;

        // Calendar state
        let calYear = today.getFullYear();
        let calMonth = today.getMonth();

        function renderCal(year, month) {
            const months = ['January','February','March','April','May','June',
                            'July','August','September','October','November','December'];
            document.getElementById('cal-label').textContent = months[month] + ' ' + year;

            const grid = document.getElementById('cal-grid');
            grid.innerHTML = '';

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const startOffset = (firstDay + 6) % 7; // Monday start

            for (let i = 0; i < startOffset; i++) {
                const cell = document.createElement('div');
                cell.className = 'cal-cell empty';
                cell.textContent = '';
                grid.appendChild(cell);
            }

            for (let d = 1; d <= daysInMonth; d++) {
                const cell = document.createElement('div');
                cell.className = 'cal-cell';
                cell.textContent = d;

                if (year === today.getFullYear() && month === today.getMonth() && d === today.getDate()) {
                    cell.classList.add('today');
                }

                grid.appendChild(cell);
            }
        }

        renderCal(calYear, calMonth);

        document.getElementById('cal-prev').addEventListener('click', () => {
            calMonth--;
            if (calMonth < 0) { calMonth = 11; calYear--; }
            renderCal(calYear, calMonth);
        });

        document.getElementById('cal-next').addEventListener('click', () => {
            calMonth++;
            if (calMonth > 11) { calMonth = 0; calYear++; }
            renderCal(calYear, calMonth);
        });
    </script>

</body>
</html>
