<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>scene i</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
        }

        body {
            overflow: hidden;
            background: #fff;
            color: #000;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        }

        .home-mark {
            position: fixed;
            inset: 0;
            display: grid;
            place-items: center;
        }

        .center-i {
            color: #000;
            display: grid;
            place-items: center;
            width: clamp(48px, 8vw, 82px);
            height: clamp(48px, 8vw, 82px);
            font-size: clamp(48px, 8vw, 82px);
            font-weight: 400;
            line-height: 1;
            text-decoration: none;
            text-transform: lowercase;
            animation: center-i-style 6s step-end infinite;
        }

        .center-i:focus-visible,
        .orbit-link:focus-visible {
            outline: 1px solid #000;
            outline-offset: 4px;
        }

        .orbit-item {
            --radius: clamp(94px, 17vw, 150px);
            --duration: 16s;
            --delay: 0s;
            position: fixed;
            left: 50%;
            top: 50%;
            width: 0;
            height: 0;
            animation: orbit var(--duration) linear infinite;
            animation-delay: var(--delay);
            transform-origin: 0 0;
        }

        .orbit-link {
            display: inline-block;
            color: #000;
            font-size: clamp(14px, 1.6vw, 19px);
            line-height: 1;
            text-decoration: none;
            text-transform: lowercase;
            white-space: nowrap;
            animation: counter-orbit var(--duration) linear infinite;
            animation-delay: var(--delay);
            transform: translateX(var(--radius)) rotate(0deg);
        }

        body:has(.orbit-item:hover, .orbit-item:focus-within) .orbit-item,
        body:has(.orbit-item:hover, .orbit-item:focus-within) .orbit-link {
            animation-play-state: paused;
        }

        @keyframes orbit {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        @keyframes counter-orbit {
            from {
                transform: translateX(var(--radius)) rotate(0deg);
            }

            to {
                transform: translateX(var(--radius)) rotate(-360deg);
            }
        }

        @keyframes center-i-style {
            0% {
                color: #000;
                font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
                font-style: normal;
                font-weight: 400;
                letter-spacing: 0;
                -webkit-text-stroke: 0 transparent;
                -webkit-text-fill-color: currentColor;
                text-shadow: none;
                background: none;
                -webkit-background-clip: initial;
                background-clip: initial;
            }

            12.5% {
                color: #e00022;
                font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
                font-style: italic;
                font-weight: 700;
                letter-spacing: 0;
                -webkit-text-stroke: 0 transparent;
                -webkit-text-fill-color: currentColor;
                text-shadow: 0.035em 0.035em 0 #ffd400;
                background: none;
                -webkit-background-clip: initial;
                background-clip: initial;
            }

            25% {
                color: transparent;
                font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
                font-style: normal;
                font-weight: 900;
                letter-spacing: 0;
                -webkit-text-stroke: 0.025em #111;
                -webkit-text-fill-color: transparent;
                text-shadow: none;
                background: linear-gradient(180deg, #00a7ff 0 45%, #f7f7f7 45% 55%, #ff2b91 55% 100%);
                -webkit-background-clip: text;
                background-clip: text;
            }

            37.5% {
                color: #6b3fc4;
                font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
                font-style: normal;
                font-weight: 700;
                letter-spacing: 0;
                -webkit-text-stroke: 0 transparent;
                -webkit-text-fill-color: currentColor;
                text-shadow: -0.045em 0 #00f0ff, 0.045em 0 #ff2b2b;
                background: none;
                -webkit-background-clip: initial;
                background-clip: initial;
            }

            50% {
                color: transparent;
                font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
                font-style: normal;
                font-weight: 900;
                letter-spacing: 0;
                -webkit-text-stroke: 0 transparent;
                -webkit-text-fill-color: transparent;
                text-shadow: none;
                background: repeating-linear-gradient(
                    45deg,
                    #1f7a35 0 0.08em,
                    #ffffff 0.08em 0.16em,
                    #111111 0.16em 0.24em
                );
                -webkit-background-clip: text;
                background-clip: text;
            }

            62.5% {
                color: #d15a00;
                font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
                font-style: italic;
                font-weight: 800;
                letter-spacing: 0;
                -webkit-text-stroke: 0.018em #111;
                -webkit-text-fill-color: currentColor;
                text-shadow: 0 0.04em 0 #f8d449;
                background: none;
                -webkit-background-clip: initial;
                background-clip: initial;
            }

            75% {
                color: transparent;
                font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
                font-style: normal;
                font-weight: 900;
                letter-spacing: 0;
                -webkit-text-stroke: 0.018em #ff005c;
                -webkit-text-fill-color: transparent;
                text-shadow: none;
                background: radial-gradient(circle at 35% 30%, #fff200 0 14%, #00c2ff 15% 30%, #222 31% 42%, #ff005c 43% 100%);
                -webkit-background-clip: text;
                background-clip: text;
            }

            87.5% {
                color: #111;
                font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
                font-style: normal;
                font-weight: 300;
                letter-spacing: 0;
                -webkit-text-stroke: 0 transparent;
                -webkit-text-fill-color: currentColor;
                text-shadow: 0.06em -0.04em 0 #00d084, -0.04em 0.05em 0 #ff4d00;
                background: none;
                -webkit-background-clip: initial;
                background-clip: initial;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .center-i,
            .orbit-item,
            .orbit-link {
                animation: none;
            }

            .orbit-item.mixes {
                transform: rotate(0deg);
            }

            .orbit-item.consume {
                transform: rotate(120deg);
            }

            .orbit-item.contact {
                transform: rotate(240deg);
            }
        }
    </style>
</head>
<body>
    <main class="home-mark" aria-label="scene i">
        <a class="center-i" href="alt2.html">i</a>
    </main>

    <div class="orbit-item mixes">
        <a class="orbit-link" href="mixes.html">mixes</a>
    </div>

    <div class="orbit-item consume" style="--delay: -5.333s;">
        <a class="orbit-link" href="consume.html">consume</a>
    </div>

    <div class="orbit-item contact" style="--delay: -10.666s;">
        <a class="orbit-link" href="contact.html">contact</a>
    </div>
</body>
</html>
