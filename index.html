<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <link rel="stylesheet" href="styles.css" />
    <style>
        #globe-container {
            position: fixed;
            bottom: 20px;
            right: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        canvas#globe {
            display: block;
            border: 1px solid #000;
        }

        #globe-label {
            font-family: 'Courier New', Courier, monospace;
            font-size: 11px;
            color: #000;
            text-align: center;
            letter-spacing: 0.02em;
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">home</a>
        <a href="gallery.html">gallery</a>
        <a href="mixes.html">mixes</a>
    </nav>

    <p>A project exploring visual documentation and archival practice.</p>

    <div id="globe-container">
        <canvas id="globe" width="60" height="60"></canvas>
        <div id="globe-label">Free Thinking Federation &copy;</div>
    </div>

    <script>
        const canvas = document.getElementById('globe');
        const ctx = canvas.getContext('2d');
        let rotation = 0;

        function drawGlobe() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.rotate(rotation);
            
            // Draw outer sphere
            ctx.strokeStyle = '#000';
            ctx.fillStyle = '#fff';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(0, 0, 28, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            
            // Draw organic brain-like neural network pattern
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 0.8;
            
            // Central vertical network
            ctx.beginPath();
            ctx.moveTo(0, -28);
            ctx.quadraticCurveTo(-8, -15, -6, 0);
            ctx.quadraticCurveTo(-8, 15, 0, 28);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(0, -28);
            ctx.quadraticCurveTo(8, -15, 6, 0);
            ctx.quadraticCurveTo(8, 15, 0, 28);
            ctx.stroke();
            
            // Hemispheric divisions
            ctx.beginPath();
            ctx.arc(0, 0, 28, 0, Math.PI);
            ctx.stroke();
            
            // Left hemisphere details
            for (let i = 1; i < 5; i++) {
                const y = -20 + (i * 8);
                const xOffset = 4 + (i * 3);
                
                ctx.beginPath();
                ctx.arc(-10, y, xOffset * 0.6, 0, Math.PI * 2);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.arc(-14, y - 2, xOffset * 0.5, 0, Math.PI * 2);
                ctx.stroke();
            }
            
            // Right hemisphere details
            for (let i = 1; i < 5; i++) {
                const y = -20 + (i * 8);
                const xOffset = 4 + (i * 3);
                
                ctx.beginPath();
                ctx.arc(10, y, xOffset * 0.6, 0, Math.PI * 2);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.arc(14, y - 2, xOffset * 0.5, 0, Math.PI * 2);
                ctx.stroke();
            }
            
            // Central ridge/fold details
            ctx.beginPath();
            ctx.moveTo(-2, -22);
            ctx.quadraticCurveTo(-1, -10, -3, 0);
            ctx.quadraticCurveTo(-1, 10, -2, 22);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(2, -22);
            ctx.quadraticCurveTo(1, -10, 3, 0);
            ctx.quadraticCurveTo(1, 10, 2, 22);
            ctx.stroke();
            
            ctx.restore();
        }

        function animate() {
            rotation += 0.015;
            drawGlobe();
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
