<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>INDISTINCT SCENE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #ffffff;
            color: #000000;
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* ── LEFT: full-height photo ── */
        .photo-pane {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .photo-pane img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            display: block;
            filter: grayscale(100%);
        }

        /* ── RIGHT: sidebar ── */
        .sidebar {
            width: 220px;
            min-width: 220px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 28px 20px 20px 20px;
            border-left: none;
            background: #ffffff;
            position: relative;
        }

        /* Site title */
        .site-title {
            font-size: 10px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            font-weight: normal;
            line-height: 1.6;
            margin-bottom: 18px;
        }

        /* Nav links */
        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 0;
            margin-bottom: 28px;
        }

        .sidebar-nav a {
            font-size: 10px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            text-decoration: none;
            color: #000;
            line-height: 1.9;
            font-weight: normal;
        }

        .sidebar-nav a:hover {
            opacity: 0.5;
        }

        /* Calendar */
        .calendar {
            margin-top: auto;
            margin-bottom: auto;
        }

        .cal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 10px;
            letter-spacing: 0.06em;
            margin-bottom: 10px;
            user-select: none;
        }

        .cal-header button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 11px;
            color: #000;
            padding: 0 2px;
            line-height: 1;
        }

        .cal-header button:hover {
            opacity: 0.5;
        }

        .cal-header .cal-label {
            font-size: 10px;
            letter-spacing: 0.06em;
        }

        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 0;
        }

        .cal-cell {
            font-size: 10px;
            text-align: center;
            padding: 3px 0;
            cursor: default;
            color: #000;
            letter-spacing: 0em;
            line-height: 1.6;
        }

        .cal-cell.today {
            font-weight: bold;
        }

        .cal-cell.has-entry {
            cursor: pointer;
            text-decoration: underline;
            text-underline-offset: 2px;
        }

        .cal-cell.has-entry:hover {
            opacity: 0.5;
        }

        .cal-cell.empty {
            color: transparent;
        }

        /* Bottom date label */
        .date-label {
            margin-top: auto;
            font-size: 10px;
            letter-spacing: 0.04em;
            color: #000;
            padding-top: 20px;
        }
    </style>
</head>
<body>

    <!-- Left: photo -->
    <div class="photo-pane">
        <img id="main-photo" src="Abuelas photos/000000010004.jpg" alt="" />
    </div>

    <!-- Right: sidebar -->
    <div class="sidebar">

        <div class="site-title">
            INDISTINCT SCENE
        </div>

        <nav class="sidebar-nav">
            <a href="index.html">DIARY</a>
            <a href="mixes.html">MIXES</a>
            <a href="gallery.html">GALLERY</a>
        </nav>

        <div class="calendar">
            <div class="cal-header">
                <button id="cal-prev">&lt;</button>
                <span class="cal-label" id="cal-label"></span>
                <button id="cal-next">&gt;</button>
            </div>
            <div class="cal-grid" id="cal-grid"></div>
        </div>

        <div class="date-label" id="date-label"></div>

    </div>

    <script>
        // Gallery images keyed by date (YYYY-MM-DD)
        const entries = {
            "2026-03-26": "Abuelas photos/000000010004.jpg",
            "2026-03-20": "Abuelas photos/000000010013.jpg",
            "2026-03-15": "Abuelas photos/000000010015.jpg",
            "2026-03-10": "Abuelas photos/000000010016.jpg",
            "2026-03-05": "Abuelas photos/000000030030.jpg",
            "2026-02-28": "Abuelas photos/000000060009.jpg",
            "2026-02-20": "Abuelas photos/000000060025.jpg",
        };

        // Show the latest entry on load
        const latestKey = Object.keys(entries).sort().reverse()[0];
        document.getElementById('main-photo').src = entries[latestKey] || "Abuelas photos/000000010004.jpg";
        document.getElementById('date-label').textContent = latestKey;

        // Calendar state
        const today = new Date();
        let calYear = today.getFullYear();
        let calMonth = today.getMonth(); // 0-indexed

        function renderCal(year, month) {
            const label = document.getElementById('cal-label');
            const grid = document.getElementById('cal-grid');

            label.textContent = (month + 1) + ' / ' + year;
            grid.innerHTML = '';

            const firstDay = new Date(year, month, 1).getDay(); // 0=Sun
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            // Blank cells before the 1st
            // Start week on Monday (shift Sunday to end)
            const startOffset = (firstDay + 6) % 7;
            for (let i = 0; i < startOffset; i++) {
                const cell = document.createElement('div');
                cell.className = 'cal-cell empty';
                cell.textContent = '';
                grid.appendChild(cell);
            }

            for (let d = 1; d <= daysInMonth; d++) {
                const cell = document.createElement('div');
                cell.className = 'cal-cell';
                cell.textContent = d;

                const dateStr = year + '-' + String(month + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');

                if (year === today.getFullYear() && month === today.getMonth() && d === today.getDate()) {
                    cell.classList.add('today');
                }

                if (entries[dateStr]) {
                    cell.classList.add('has-entry');
                    cell.addEventListener('click', () => {
                        document.getElementById('main-photo').src = entries[dateStr];
                        document.getElementById('date-label').textContent = dateStr;
                    });
                }

                grid.appendChild(cell);
            }
        }

        renderCal(calYear, calMonth);

        document.getElementById('cal-prev').addEventListener('click', () => {
            calMonth--;
            if (calMonth < 0) { calMonth = 11; calYear--; }
            renderCal(calYear, calMonth);
        });

        document.getElementById('cal-next').addEventListener('click', () => {
            calMonth++;
            if (calMonth > 11) { calMonth = 0; calYear++; }
            renderCal(calYear, calMonth);
        });
    </script>

</body>
</html>
