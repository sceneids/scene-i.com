<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>scene i</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
        }

        body {
            overflow: hidden;
            background: #fff;
            color: #000;
            font-family: "Times New Roman", Times, serif;
        }

        .home-mark {
            position: fixed;
            inset: 0;
            display: grid;
            place-items: center;
        }

        .center-i {
            color: #000;
            display: grid;
            place-items: center;
            width: 24px;
            height: 24px;
            font-size: 18px;
            font-weight: 400;
            line-height: 1;
            text-decoration: none;
            text-transform: lowercase;
        }

        .center-i:focus-visible,
        .home-link:focus-visible {
            outline: 1px solid #000;
            outline-offset: 4px;
        }

        .home-link {
            position: fixed;
            color: #000;
            font-size: clamp(18px, 2vw, 28px);
            font-weight: 700;
            line-height: 1;
            text-decoration: none;
            text-transform: lowercase;
            white-space: nowrap;
        }

        .home-link:hover,
        .home-link:focus-visible {
            text-decoration: underline;
        }

        .home-link.mixes {
            left: calc(50% - clamp(170px, 18vw, 270px));
            top: calc(50% - clamp(70px, 7vw, 120px));
        }

        .home-link.consume {
            left: calc(50% + clamp(36px, 7vw, 130px));
            top: calc(50% - clamp(130px, 12vw, 210px));
        }

        .home-link.contact {
            left: calc(50% + clamp(92px, 11vw, 190px));
            top: calc(50% + clamp(34px, 5vw, 80px));
        }

        @media (max-width: 680px) {
            .home-link {
                font-size: clamp(16px, 5.2vw, 22px);
            }

            .home-link.mixes {
                left: 18vw;
                top: 38vh;
            }

            .home-link.consume {
                left: 53vw;
                top: 30vh;
            }

            .home-link.contact {
                left: 57vw;
                top: 60vh;
            }
        }
    </style>
</head>
<body>
    <main class="home-mark" aria-label="scene i">
        <a class="center-i" href="index.html">i</a>
    </main>

    <a class="home-link mixes" href="mixes.html">mixes</a>
    <a class="home-link consume" href="consume.html">consume</a>
    <a class="home-link contact" href="contact.html">contact</a>
</body>
</html>
