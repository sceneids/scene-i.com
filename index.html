<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <link rel="stylesheet" href="styles.css" />
    <style>
        #globe-container {
            position: fixed;
            bottom: 20px;
            right: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        canvas#globe {
            display: block;
        }

        #globe-label {
            font-family: 'Courier New', Courier, monospace;
            font-size: 11px;
            color: #000;
            text-align: center;
            letter-spacing: 0.02em;
        }

        #location-container {
            position: fixed;
            bottom: 20px;
            left: 40px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 6px;
        }

        #datetime {
            font-family: 'Courier New', Courier, monospace;
            font-size: 11px;
            color: #000;
            letter-spacing: 0.02em;
        }

        #flag-location {
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 11px;
            color: #000;
        }

        #flag {
            font-size: 16px;
        }

        #barcode-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.4;
            z-index: 1;
            pointer-events: none;
        }

        canvas#barcode {
            display: block;
        }

        nav {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        nav a {
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
            color: #000;
            text-decoration: none;
            cursor: default;
        }

        #flag-canvas {
            width: 20px;
            height: 14px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">home</a>
        <a href="gallery.html">gallery</a>
        <a href="mixes.html">mixes</a>
    </nav>

    <p>a project exploring visual documentation and archival practice.</p>

    <div id="location-container">
        <div id="datetime"></div>
        <div id="flag-location">
            <canvas id="flag-canvas" width="20" height="14"></canvas>
            <span id="location-text">loading...</span>
        </div>
    </div>

    <div id="barcode-container">
        <canvas id="barcode" width="200" height="80"></canvas>
    </div>

    <div id="globe-container">
        <canvas id="globe" width="60" height="60"></canvas>
        <div id="globe-label">Free Thinking Federation &copy;</div>
    </div>

    <script>
        // List of countries and color schemes for flags
        const countries = [
            { name: 'Japan', code: 'JP', colors: ['#bc002d', '#fff'] },
            { name: 'Brazil', code: 'BR', colors: ['#009c3b', '#ffcc00'] },
            { name: 'Mexico', code: 'MX', colors: ['#ce1126', '#fff'] },
            { name: 'France', code: 'FR', colors: ['#002395', '#fff', '#ED2939'] },
            { name: 'Germany', code: 'DE', colors: ['#000', '#D00', '#FFCE00'] },
            { name: 'Italy', code: 'IT', colors: ['#009246', '#fff', '#CE2B37'] },
            { name: 'Spain', code: 'ES', colors: ['#c60b1e', '#ffc400'] },
            { name: 'Greece', code: 'GR', colors: ['#0066cc', '#fff'] },
            { name: 'Turkey', code: 'TR', colors: ['#e30613', '#fff'] },
            { name: 'Egypt', code: 'EG', colors: ['#ce1126', '#fff', '#007a5e'] },
            { name: 'Nigeria', code: 'NG', colors: ['#008753', '#fff'] },
            { name: 'Kenya', code: 'KE', colors: ['#000', '#fff', '#ce1126'] },
            { name: 'South Africa', code: 'ZA', colors: ['#000', '#fff', '#007a5e', '#ffb81c', '#ff0000'] },
            { name: 'India', code: 'IN', colors: ['#ff9933', '#fff', '#138808'] },
            { name: 'China', code: 'CN', colors: ['#de2910', '#ffde00'] },
            { name: 'Thailand', code: 'TH', colors: ['#a51e3d', '#fff', '#000'] },
            { name: 'Vietnam', code: 'VN', colors: ['#ce1126', '#ffde00'] },
            { name: 'Australia', code: 'AU', colors: ['#00008b', '#fff', '#ff0000'] },
            { name: 'New Zealand', code: 'NZ', colors: ['#00008b', '#fff', '#c8102e'] },
            { name: 'Canada', code: 'CA', colors: ['#ff0000', '#fff'] },
        ];

        // Draw animated flag
        function drawAnimatedFlag(countryIndex, time) {
            const flagCanvas = document.getElementById('flag-canvas');
            const flagCtx = flagCanvas.getContext('2d');
            const country = countries[countryIndex];
            const colors = country.colors;

            flagCtx.clearRect(0, 0, flagCanvas.width, flagCanvas.height);
            
            // Add wave animation
            const wave = Math.sin(time * 0.005) * 2;
            
            if (colors.length === 2) {
                // Two color flag (vertical stripes)
                flagCtx.fillStyle = colors[0];
                flagCtx.fillRect(0, 0, 10 + wave, 14);
                flagCtx.fillStyle = colors[1];
                flagCtx.fillRect(10 + wave, 0, 10, 14);
            } else if (colors.length === 3) {
                // Three color flag (horizontal or vertical stripes)
                const stripe = 14 / 3;
                for (let i = 0; i < 3; i++) {
                    flagCtx.fillStyle = colors[i];
                    flagCtx.fillRect(0, i * stripe, 20 + wave, stripe);
                }
            } else if (colors.length === 5) {
                // Complex flag (South Africa)
                flagCtx.fillStyle = colors[0];
                flagCtx.fillRect(0, 0, 20, 7 + wave);
                flagCtx.fillStyle = colors[1];
                flagCtx.fillRect(0, 7 + wave, 20, 7);
                flagCtx.fillStyle = colors[2];
                flagCtx.fillRect(0 + wave, 0, 5, 14);
                flagCtx.fillStyle = colors[3];
                flagCtx.fillRect(8 + wave, 4, 4, 6);
                flagCtx.fillStyle = colors[4];
                flagCtx.fillRect(13 + wave, 0, 7, 14);
            }
        }

        // Draw improved barcode with better black/white contrast
        const barcodeCanvas = document.getElementById('barcode');
        const barcodeCtx = barcodeCanvas.getContext('2d');
        
        function drawBarcode() {
            barcodeCtx.fillStyle = '#fff';
            barcodeCtx.fillRect(0, 0, barcodeCanvas.width, barcodeCanvas.height);
            
            barcodeCtx.fillStyle = '#000';
            
            // More realistic barcode pattern
            let x = 15;
            const barData = [1, 1, 2, 1, 1, 2, 1, 2, 1, 1, 2, 1, 2, 2, 1, 2, 1, 1, 1, 2, 1, 2, 2, 1, 2, 1, 1, 2, 2, 1];
            
            // Start guard
            barcodeCtx.fillRect(x, 8, 2, 56);
            x += 4;
            barcodeCtx.fillRect(x, 8, 1, 56);
            x += 3;
            
            // Bars
            for (let i = 0; i < barData.length; i++) {
                const barWidth = barData[i];
                barcodeCtx.fillRect(x, 8, barWidth, 56);
                x += barWidth + 1;
            }
            
            // End guard
            barcodeCtx.fillRect(x, 8, 2, 56);
            x += 4;
            
            // Numbers below barcode
            barcodeCtx.font = 'bold 11px Courier New';
            barcodeCtx.fillText('5 901234 123457', 20, 72);
        }
        
        drawBarcode();

        const canvas = document.getElementById('globe');
        const ctx = canvas.getContext('2d');
        let rotation = 0;
        let flagTime = 0;

        function drawGlobe() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Calculate orbital position
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const orbitRadius = 15;
            const globeX = centerX + Math.cos(rotation) * orbitRadius;
            const globeY = centerY + Math.sin(rotation) * orbitRadius;
            
            ctx.save();
            ctx.translate(globeX, globeY);
            
            // Create 3D pixelated Earth with rotation
            const pixelSize = 2;
            const radius = 14;
            
            // Draw pixelated Earth with 3D depth
            for (let x = -radius; x <= radius; x += pixelSize) {
                for (let y = -radius; y <= radius; y += pixelSize) {
                    const distFromCenter = Math.sqrt(x * x + y * y);
                    
                    if (distFromCenter <= radius) {
                        // Calculate 3D depth based on position
                        const angle = Math.atan2(y, x) + rotation;
                        const depthFactor = Math.cos(angle);
                        
                        // Only draw front-facing pixels
                        if (depthFactor > 0) {
                            // Vary opacity based on depth for 3D effect
                            ctx.globalAlpha = 0.5 + depthFactor * 0.5;
                            
                            // Create land/water pattern
                            const noise = Math.sin(x * 0.3 + rotation) * Math.cos(y * 0.3 + rotation * 1.2);
                            
                            if (noise > 0.1) {
                                // Land (darker)
                                ctx.fillStyle = '#333';
                            } else if (noise > -0.2) {
                                // Transition
                                ctx.fillStyle = '#666';
                            } else {
                                // Water (lighter)
                                ctx.fillStyle = '#999';
                            }
                            
                            ctx.fillRect(x, y, pixelSize, pixelSize);
                            
                            // Add black outline for pixel definition
                            ctx.globalAlpha = 0.3;
                            ctx.strokeStyle = '#000';
                            ctx.lineWidth = 0.5;
                            ctx.strokeRect(x, y, pixelSize, pixelSize);
                        }
                    }
                }
            }
            
            ctx.globalAlpha = 1;
            
            // Draw outer sphere outline
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(0, 0, radius, 0, Math.PI * 2);
            ctx.stroke();
            
            ctx.restore();
        }

        function animate() {
            rotation += 0.02;
            flagTime += 1;
            drawGlobe();
            
            // Get current/stored country index
            const countryIndex = parseInt(localStorage.getItem('selectedCountryIndex') || '0');
            drawAnimatedFlag(countryIndex, flagTime);
            
            requestAnimationFrame(animate);
        }

        animate();

        function updateDateTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const year = now.getFullYear();
            
            document.getElementById('datetime').textContent = `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
        }

        // Generate random location on page load
        function generateRandomLocation() {
            const countryIndex = Math.floor(Math.random() * countries.length);
            const country = countries[countryIndex];
            
            // Store for persistent flag animation
            localStorage.setItem('selectedCountryIndex', countryIndex);
            
            document.getElementById('location-text').textContent = country.name;
            drawAnimatedFlag(countryIndex, 0);
        }

        // Generate random location on page load
        generateRandomLocation();

        // Update time every second
        updateDateTime();
        setInterval(updateDateTime, 1000);
    </script>
</body>
</html>
