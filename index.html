<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <link rel="stylesheet" href="styles.css" />
    <style>
        #globe-container {
            position: fixed;
            bottom: 20px;
            right: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        canvas#globe {
            display: block;
            border: 1px solid #000;
        }

        #globe-label {
            font-family: 'Courier New', Courier, monospace;
            font-size: 11px;
            color: #000;
            text-align: center;
            letter-spacing: 0.02em;
        }

        #location-container {
            position: fixed;
            bottom: 20px;
            left: 40px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 6px;
        }

        #datetime {
            font-family: 'Courier New', Courier, monospace;
            font-size: 11px;
            color: #000;
            letter-spacing: 0.02em;
        }

        #flag-location {
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 11px;
            color: #000;
        }

        #flag {
            font-size: 16px;
        }

        #barcode-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.3;
            z-index: 1;
            pointer-events: none;
        }

        #barcode {
            font-family: 'Courier New', Courier, monospace;
            font-size: 24px;
            letter-spacing: 2px;
            color: #000;
            font-weight: bold;
            writing-mode: horizontal-tb;
            line-height: 1.2;
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">home</a>
        <a href="gallery.html">gallery</a>
        <a href="mixes.html">mixes</a>
    </nav>

    <p>a project exploring visual documentation and archival practice.</p>

    <div id="location-container">
        <div id="datetime"></div>
        <div id="flag-location">
            <span id="flag">🌍</span>
            <span id="location-text">loading...</span>
        </div>
    </div>

    <div id="barcode-container">
        <div id="barcode">||||||||| |||| |||| ||||</div>
    </div>

    <div id="globe-container">
        <canvas id="globe" width="60" height="60"></canvas>
        <div id="globe-label">Free Thinking Federation &copy;</div>
    </div>

    <script>
        const canvas = document.getElementById('globe');
        const ctx = canvas.getContext('2d');
        let rotation = 0;

        function drawGlobe() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.rotate(rotation);
            
            // Draw outer sphere
            ctx.strokeStyle = '#000';
            ctx.fillStyle = '#fff';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(0, 0, 28, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            
            // Draw organic brain-like neural network pattern
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 0.8;
            
            // Central vertical network
            ctx.beginPath();
            ctx.moveTo(0, -28);
            ctx.quadraticCurveTo(-8, -15, -6, 0);
            ctx.quadraticCurveTo(-8, 15, 0, 28);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(0, -28);
            ctx.quadraticCurveTo(8, -15, 6, 0);
            ctx.quadraticCurveTo(8, 15, 0, 28);
            ctx.stroke();
            
            // Hemispheric divisions
            ctx.beginPath();
            ctx.arc(0, 0, 28, 0, Math.PI);
            ctx.stroke();
            
            // Left hemisphere details
            for (let i = 1; i < 5; i++) {
                const y = -20 + (i * 8);
                const xOffset = 4 + (i * 3);
                
                ctx.beginPath();
                ctx.arc(-10, y, xOffset * 0.6, 0, Math.PI * 2);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.arc(-14, y - 2, xOffset * 0.5, 0, Math.PI * 2);
                ctx.stroke();
            }
            
            // Right hemisphere details
            for (let i = 1; i < 5; i++) {
                const y = -20 + (i * 8);
                const xOffset = 4 + (i * 3);
                
                ctx.beginPath();
                ctx.arc(10, y, xOffset * 0.6, 0, Math.PI * 2);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.arc(14, y - 2, xOffset * 0.5, 0, Math.PI * 2);
                ctx.stroke();
            }
            
            // Central ridge/fold details
            ctx.beginPath();
            ctx.moveTo(-2, -22);
            ctx.quadraticCurveTo(-1, -10, -3, 0);
            ctx.quadraticCurveTo(-1, 10, -2, 22);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(2, -22);
            ctx.quadraticCurveTo(1, -10, 3, 0);
            ctx.quadraticCurveTo(1, 10, 2, 22);
            ctx.stroke();
            
            ctx.restore();
        }

        function animate() {
            rotation += 0.015;
            drawGlobe();
            requestAnimationFrame(animate);
        }

        animate();

        // Get user location from IP and update time/flag
        function countryCodeToFlag(countryCode) {
            const codePoints = countryCode
                .toUpperCase()
                .split('')
                .map(char => 127397 + char.charCodeAt());
            return String.fromCodePoint(...codePoints);
        }

        function updateDateTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const year = now.getFullYear();
            
            document.getElementById('datetime').textContent = `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
        }

        // Fetch geolocation from IP
        fetch('https://ipapi.co/json/')
            .then(response => response.json())
            .then(data => {
                const countryCode = data.country_code;
                const countryName = data.country_name;
                const city = data.city;
                
                const flag = countryCodeToFlag(countryCode);
                document.getElementById('flag').textContent = flag;
                
                const locationText = city ? `${city}, ${countryName}` : countryName;
                document.getElementById('location-text').textContent = locationText;
            })
            .catch(error => {
                console.log('Location fetch error:', error);
                document.getElementById('location-text').textContent = 'location unavailable';
            });

        // Update time every second
        updateDateTime();
        setInterval(updateDateTime, 1000);
    </script>
</body>
</html>
