<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Indistinct Scene</title>
    <link href="https://fonts.googleapis.com/css2?family=Cal+Sans&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Symbols&display=swap" rel="stylesheet">
    <style>
        body {
    margin: 0;
    padding: 80px 40px 40px 40px; /* more space at the top for fixed header */
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    color: black; /* Text color */
    overflow-x: hidden;
    text-transform: uppercase;

    /* --- BACKGROUND PROPERTIES --- */
    background-color: white; /* Plain white background */
    position: relative;
}
        
        .wormhole-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            opacity: 0.6;
        }

        .wormhole-canvas {
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        

        @keyframes revolve {
            0% {
                transform: translate(-50%, -50%) rotateY(0deg);
            }
            100% {
                transform: translate(-50%, -50%) rotateY(360deg);
            }
        }

        .hero-wrapper {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1000;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 80px;
        }

        .ids-stack {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.25em;
            font-size: 24px;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            color: #FFE600;
            margin: 0;
            padding: 0;
        }

        .ids-line {
            display: block;
            line-height: 1.2;
            white-space: nowrap;
        }

        

        nav {
            font-size: 24px;
            font-weight: normal;
            font-family: 'Times New Roman', Times, serif;
            display: flex;
            flex-direction: column;
            gap: 15px;
            text-align: center;
            text-transform: none;
        }

        nav a {
            display: block;
            text-decoration: none;
            color: #000000 !important;
            margin-bottom: 5px;
            transition: color 0.3s ease;
            text-transform: lowercase;
        }

        nav a:hover {
            color: red;
        }

        section {
            display: none;
            padding-top: 150px;
            min-height: calc(100vh - 80px - 40px);
            box-sizing: border-box;
        }

        section.active {
            display: block;
        }



        /* Basic responsive adjustments */
        @media (max-width: 768px) {
            .ids-stack { font-size: 20px; }
            nav { font-size: 20px; }
            body {
                padding: 60px 20px 20px 20px;
            }
        }

        @media (max-width: 480px) {
            .ids-stack { font-size: 18px; }
            nav { font-size: 18px; }
        }
    </style>
</head>
<body>
    <div class="wormhole-container">
        <canvas class="wormhole-canvas" id="wormholeCanvas"></canvas>
    </div>

    <div class="hero-wrapper">
        <nav>
            <a href="index.html" onclick="if(typeof showSection === 'function') showSection('home'); return false;">home</a>
            <a href="mixes.html">mixes</a>
            <a href="gallery.html">gallery</a>
        </nav>
        <div class="ids-stack">
            <span class="ids-line ids-mandarin">艾 迪 斯</span>
            <span class="ids-line ids-russian">И Д С</span>
            <span class="ids-line ids-korean">아 이 디 에 스</span>
            <span class="ids-line">⠊⠙⠎</span>
        </div>
    </div>

    <section id="home" class="active">
        <h2></h2>
        <p></p>
        <p></p>
    </section>



    <script>
        function showSection(id) {
            document.querySelectorAll("section").forEach((section) => {
                section.classList.remove("active");
            });
            document.getElementById(id).classList.add("active");
        }

        // Prefetch a few gallery images so they are cached before navigation
        function prefetchGalleryImages() {
            const galleryImages = [
                "Abuelas photos/000000010004.jpg",
                "Abuelas photos/000000010013.jpg",
                "Abuelas photos/000000010015.jpg"
            ];

            galleryImages.forEach((src) => {
                const img = new Image();
                img.src = src;
            });
        }

        // Initialize to show the home section on page load
        document.addEventListener("DOMContentLoaded", () => {
            showSection('home');
            initWormhole();
            prefetchGalleryImages();
        });

        // 3D Wormhole Animation
        function initWormhole() {
            const canvas = document.getElementById('wormholeCanvas');
            const ctx = canvas.getContext('2d');
            let time = 0;

            function resizeCanvas() {
                // Low internal resolution for pixelation effect
                canvas.width = Math.floor(window.innerWidth / 6);
                canvas.height = Math.floor(window.innerHeight / 6);
            }

            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            function drawWormhole() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;
                const maxRadius = Math.max(canvas.width, canvas.height) * 0.8;
                
                time += 0.01;

                // Draw multiple rotating rings to create wormhole effect
                for (let i = 0; i < 20; i++) {
                    const progress = i / 20;
                    const radius = progress * maxRadius * (0.3 + Math.sin(time + progress * 5) * 0.2);
                    const angle = time * 2 + progress * 10;
                    
                    // Create distortion effect
                    const distortion = Math.sin(time * 3 + progress * 8) * 0.15;
                    
                    ctx.save();
                    ctx.translate(centerX, centerY);
                    ctx.rotate(angle);
                    
                    // Create gradient for each ring
                    const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, radius);
                    const alpha = (1 - progress) * 0.4;
                    
                    gradient.addColorStop(0, `rgba(180, 0, 255, ${alpha * 0.3})`);
                    gradient.addColorStop(0.5, `rgba(180, 0, 255, ${alpha * 0.2})`);
                    gradient.addColorStop(1, 'rgba(180, 0, 255, 0)');
                    
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    
                    // Draw distorted ellipse
                    const width = radius * (1 + distortion);
                    const height = radius * (1 - distortion * 0.5);
                    
                    ctx.ellipse(0, 0, width, height, 0, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // Add spiral lines
                    ctx.strokeStyle = `rgba(180, 0, 255, ${alpha * 0.5})`;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    for (let j = 0; j < 8; j++) {
                        const a = (j / 8) * Math.PI * 2;
                        const r1 = radius * 0.3;
                        const r2 = radius * 0.9;
                        ctx.moveTo(Math.cos(a) * r1, Math.sin(a) * r1);
                        ctx.lineTo(Math.cos(a) * r2, Math.sin(a) * r2);
                    }
                    ctx.stroke();
                    
                    ctx.restore();
                }
                
                // Draw center vortex
                const centerGradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, maxRadius * 0.2);
                centerGradient.addColorStop(0, 'rgba(180, 0, 255, 0.2)');
                centerGradient.addColorStop(1, 'rgba(180, 0, 255, 0)');
                ctx.fillStyle = centerGradient;
                ctx.beginPath();
                ctx.arc(centerX, centerY, maxRadius * 0.2, 0, Math.PI * 2);
                ctx.fill();
                
                requestAnimationFrame(drawWormhole);
            }
            
            drawWormhole();
        }
    </script>
    <script src="router.js"></script>
    <script data-init>
        // Reinitialize wormhole on navigation
        if (typeof initWormhole === 'function') {
            initWormhole();
        }
    </script>
</body>
</html>
