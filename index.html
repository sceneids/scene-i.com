<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Indistinct Scene</title>
    <link href="https://fonts.googleapis.com/css2?family=Cal+Sans&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Symbols&display=swap" rel="stylesheet">
    <style>
        body {
    margin: 0;
    padding: 80px 40px 40px 40px; /* more space at the top for fixed header */
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    color: black; /* Text color */
    overflow-x: hidden;
    text-transform: uppercase;

    /* --- BACKGROUND PROPERTIES --- */
    background-color: white; /* Plain white background */
    position: relative;
}
        
        .wormhole-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            opacity: 0.82;
            background: white;
        }

        .wormhole-canvas {
            width: 100%;
            height: 100%;
            image-rendering: auto;
        }
        

        @keyframes revolve {
            0% {
                transform: translate(-50%, -50%) rotateY(0deg);
            }
            100% {
                transform: translate(-50%, -50%) rotateY(360deg);
            }
        }

        .hero-wrapper {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1000;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 80px;
        }

        .ids-stack {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.25em;
            font-size: 24px;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            color: #FFE600;
            margin: 0;
            padding: 0;
        }

        .ids-line {
            display: block;
            line-height: 1.2;
            white-space: nowrap;
        }

        

        nav {
            font-size: 24px;
            font-weight: normal;
            font-family: 'Times New Roman', Times, serif;
            display: flex;
            flex-direction: column;
            gap: 15px;
            text-align: center;
            text-transform: none;
            z-index: 999;
        }

        nav a {
            display: block;
            text-decoration: none;
            color: #000000 !important;
            margin-bottom: 5px;
            transition: color 0.3s ease;
            text-transform: lowercase;
        }

        nav a:hover {
            color: red;
        }

        section {
            display: none;
            padding-top: 150px;
            min-height: calc(100vh - 80px - 40px);
            box-sizing: border-box;
        }

        section.active {
            display: block;
        }



        /* Basic responsive adjustments */
        @media (max-width: 768px) {
            .ids-stack { font-size: 20px; }
            nav { font-size: 20px; }
            body {
                padding: 60px 20px 20px 20px;
            }
        }

        @media (max-width: 480px) {
            .ids-stack { font-size: 18px; }
            nav { font-size: 18px; }
        }
    </style>
</head>
<body>
    <div class="wormhole-container">
        <canvas class="wormhole-canvas" id="wormholeCanvas"></canvas>
    </div>

    <div class="hero-wrapper">
        <nav>
            <a href="index.html" onclick="if(typeof showSection === 'function') showSection('home'); return false;">home</a>
            <a href="mixes.html">mixes</a>
            <a href="gallery.html">gallery</a>
        </nav>
        <div class="ids-stack">
            <span class="ids-line ids-mandarin">艾 迪 斯</span>
            <span class="ids-line ids-russian">И Д С</span>
            <span class="ids-line ids-korean">아 이 디 에 스</span>
            <span class="ids-line">⠊⠙⠎</span>
        </div>
    </div>

    <section id="home" class="active">
        <h2></h2>
        <p></p>
        <p></p>
    </section>



    <script>
        function showSection(id) {
            document.querySelectorAll("section").forEach((section) => {
                section.classList.remove("active");
            });
            document.getElementById(id).classList.add("active");
        }

        // Prefetch a few gallery images so they are cached before navigation
        function prefetchGalleryImages() {
            const galleryImages = [
                "Abuelas photos/000000010004.jpg",
                "Abuelas photos/000000010013.jpg",
                "Abuelas photos/000000010015.jpg"
            ];

            galleryImages.forEach((src) => {
                const img = new Image();
                img.src = src;
            });
        }

        // Initialize to show the home section on page load
        document.addEventListener("DOMContentLoaded", () => {
            showSection('home');
            initWormhole();
            prefetchGalleryImages();
        });

        // Dot-matrix wormhole animation
        function initWormhole() {
            const canvas = document.getElementById('wormholeCanvas');
            const ctx = canvas.getContext('2d');
            let time = 0;

            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            function drawWormhole() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                const cx = canvas.width / 2;
                const cy = canvas.height / 2;
                const R = Math.min(canvas.width, canvas.height) * 0.42;
                time += 0.004;

                const DOT_COUNT = 18000;

                for (let i = 0; i < DOT_COUNT; i++) {
                    const t = i / DOT_COUNT;

                    // Spherical shell distribution
                    const theta = Math.acos(2 * Math.random() - 1);
                    const phi = Math.random() * Math.PI * 2;

                    const sinT = Math.sin(theta);
                    const cosT = Math.cos(theta);
                    const sinP = Math.sin(phi + time * 0.3);
                    const cosP = Math.cos(phi + time * 0.3);

                    // 3D sphere point
                    let x3 = sinT * cosP;
                    let y3 = sinT * sinP;
                    let z3 = cosT;

                    // Wormhole throat pinch — pull points near poles inward
                    const throatStrength = Math.exp(-Math.abs(z3) * 3.5) * 0.75;
                    const r2d = Math.sqrt(x3 * x3 + y3 * y3) + 0.001;
                    x3 -= (x3 / r2d) * throatStrength * 0.5;
                    y3 -= (y3 / r2d) * throatStrength * 0.5;

                    // Wormhole tunnel rings — ellipses narrowing toward center
                    const ringY = z3 * 0.55; // vertical position of the ring
                    const ringScale = 0.18 + Math.abs(z3) * 0.35; // smaller near center
                    const ringAngle = phi + time * (z3 > 0 ? 0.5 : -0.5);
                    const useRing = Math.random() < 0.22; // 22% of dots form the rings
                    
                    let px, py;
                    if (useRing && z3 > 0.1) {
                        // Draw the funnel/throat rings visible at top
                        px = cx + Math.cos(ringAngle) * ringScale * R * 0.8;
                        py = cy - R * 0.35 + ringY * R * 1.2;
                    } else {
                        // Project sphere to 2D
                        const perspective = 1.8 / (1.8 - y3 * 0.4);
                        px = cx + x3 * R * perspective;
                        py = cy + z3 * R * perspective * 0.92;
                    }

                    // Brightness — bright at center star, darker at edges
                    const distFromCenter = Math.sqrt((px - cx) ** 2 + (py - cy) ** 2);
                    const normalizedDist = distFromCenter / R;
                    
                    let brightness;
                    if (normalizedDist < 0.04) {
                        // Bright star burst at center
                        brightness = 1.0;
                    } else if (normalizedDist < 0.12) {
                        brightness = 0.85 - normalizedDist * 2;
                    } else {
                        brightness = Math.max(0.05, 0.55 - normalizedDist * 0.5 + Math.random() * 0.08);
                    }

                    // Add film grain / noise texture
                    brightness *= (0.75 + Math.random() * 0.25);

                    // Clip to sphere boundary with soft edge fade
                    if (normalizedDist > 1.02) continue;
                    if (normalizedDist > 0.88) {
                        brightness *= (1.02 - normalizedDist) / 0.14;
                    }

                    const gray = Math.floor(brightness * 255);
                    const dotSize = normalizedDist < 0.06 ? 2.5 : 1.2;

                    ctx.fillStyle = `rgb(${gray},${gray},${gray})`;
                    ctx.beginPath();
                    ctx.arc(px, py, dotSize, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Star burst rays at center
                const rayCount = 12;
                for (let r = 0; r < rayCount; r++) {
                    const angle = (r / rayCount) * Math.PI * 2 + time * 0.2;
                    const len = R * (0.18 + Math.random() * 0.07);
                    const gradient = ctx.createLinearGradient(cx, cy, cx + Math.cos(angle) * len, cy + Math.sin(angle) * len);
                    gradient.addColorStop(0, 'rgba(255,255,255,0.55)');
                    gradient.addColorStop(1, 'rgba(255,255,255,0)');
                    ctx.strokeStyle = gradient;
                    ctx.lineWidth = 0.8;
                    ctx.beginPath();
                    ctx.moveTo(cx, cy);
                    ctx.lineTo(cx + Math.cos(angle) * len, cy + Math.sin(angle) * len);
                    ctx.stroke();
                }

                requestAnimationFrame(drawWormhole);
            }

            drawWormhole();
        }
    </script>
    <script src="router.js"></script>
    <script data-init>
        // Reinitialize wormhole on navigation
        if (typeof initWormhole === 'function') {
            initWormhole();
        }
    </script>
</body>
</html>
