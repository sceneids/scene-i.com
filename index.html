<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>scene i</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
        }

        body {
            overflow: hidden;
            background: #fff;
            color: #000;
            font-family: "Times New Roman", Times, serif;
        }

        .floating-link {
            position: fixed;
            left: 0;
            top: 0;
            z-index: 1;
            display: inline-block;
            color: #000;
            font-family: "Times New Roman", Times, serif;
            font-size: clamp(12px, 1.4vw, 18px);
            line-height: 1;
            text-decoration: none;
            text-transform: lowercase;
            white-space: nowrap;
            will-change: transform;
        }

        .floating-link:focus-visible {
            outline: 1px solid #000;
            outline-offset: 3px;
        }

        @media (prefers-reduced-motion: reduce) {
            .floating-link {
                transform: translate3d(var(--still-x), var(--still-y), 0);
            }
        }
    </style>
</head>
<body>
    <a class="floating-link" href="mixes.html" data-x="0.72" data-y="0.56" data-vx="-15" data-vy="20" style="--still-x: 72vw; --still-y: 56vh;">mixes</a>
    <a class="floating-link" href="alt2.html" data-x="0.43" data-y="0.78" data-vx="13" data-vy="-18" style="--still-x: 43vw; --still-y: 78vh;">i</a>

    <script>
        const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const floatingLinks = Array.from(document.querySelectorAll('.floating-link'));
        const words = floatingLinks.map((element) => ({
            element,
            x: Number(element.dataset.x) * window.innerWidth,
            y: Number(element.dataset.y) * window.innerHeight,
            vx: Number(element.dataset.vx),
            vy: Number(element.dataset.vy),
            pointerPaused: false,
            focusPaused: false,
        }));
        let pointer = null;

        function keepInBounds(word) {
            const rect = word.element.getBoundingClientRect();
            const maxX = window.innerWidth - rect.width;
            const maxY = window.innerHeight - rect.height;

            if (word.x <= 0 || word.x >= maxX) {
                word.vx *= -1;
                word.x = Math.min(Math.max(word.x, 0), maxX);
            }

            if (word.y <= 0 || word.y >= maxY) {
                word.vy *= -1;
                word.y = Math.min(Math.max(word.y, 0), maxY);
            }
        }

        function render(word) {
            word.element.style.transform = `translate3d(${word.x}px, ${word.y}px, 0)`;
        }

        function syncPointerPause(word) {
            if (!pointer) {
                word.pointerPaused = false;
                return;
            }

            const topElement = document.elementFromPoint(pointer.x, pointer.y);
            word.pointerPaused = topElement === word.element || word.element.contains(topElement);
        }

        function isPaused(word) {
            return word.pointerPaused || word.focusPaused;
        }

        window.addEventListener('pointermove', (event) => {
            pointer = { x: event.clientX, y: event.clientY };
            words.forEach(syncPointerPause);
        });

        window.addEventListener('pointerleave', () => {
            pointer = null;
            words.forEach(syncPointerPause);
        });

        words.forEach((word) => {
            word.element.addEventListener('pointerenter', () => {
                word.pointerPaused = true;
            });

            word.element.addEventListener('pointerleave', () => {
                syncPointerPause(word);
            });

            word.element.addEventListener('focus', () => {
                word.focusPaused = true;
            });

            word.element.addEventListener('blur', () => {
                word.focusPaused = false;
            });
        });

        words.forEach(render);

        if (!reduceMotion) {
            let lastTime = performance.now();

            function moveWords(time) {
                const seconds = Math.min((time - lastTime) / 1000, 0.05);
                lastTime = time;

                words.forEach((word) => {
                    syncPointerPause(word);

                    if (isPaused(word)) {
                        return;
                    }

                    word.x += word.vx * seconds;
                    word.y += word.vy * seconds;
                    keepInBounds(word);
                    render(word);
                    syncPointerPause(word);
                });

                requestAnimationFrame(moveWords);
            }

            requestAnimationFrame(moveWords);
        }

        window.addEventListener('resize', () => {
            words.forEach((word) => {
                keepInBounds(word);
                render(word);
            });
        });
    </script>
</body>
</html>
