<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Indistinct Scene</title>
    <link href="https://fonts.googleapis.com/css2?family=Cal+Sans&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Symbols&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
    margin: 0;
    padding: 0;
    font-family: 'Space Grotesk', sans-serif;
    color: black; /* Text color */
    overflow-x: hidden;
    text-transform: uppercase;

    /* --- BACKGROUND PROPERTIES --- */
    position: relative;
}
        
        .wormhole-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            opacity: 0.82;
            background: white;
        }

        .wormhole-canvas {
            width: 100%;
            height: 100%;
            image-rendering: auto;
        }
        

        @keyframes revolve {
            0% {
                transform: translate(-50%, -50%) rotateY(0deg);
            }
            100% {
                transform: translate(-50%, -50%) rotateY(360deg);
            }
        }

        .hero-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            pointer-events: none;
        }

        .ids-stack {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(4vw, -50%);
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 18px;
            font-size: 24px;
            font-family: 'Space Grotesk', sans-serif;
            color: #cccccc;
            text-transform: uppercase;
            z-index: 1001;
            pointer-events: auto;
        }

        .ids-line {
            display: block;
            line-height: 1.2;
            white-space: nowrap;
        }

        

        nav {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-20vw, -50%);
            display: flex;
            flex-direction: column;
            gap: 18px;
            text-align: left;
            z-index: 1001;
            padding: 0;
            justify-content: center;
            align-items: flex-start;
            pointer-events: auto;
        }

        nav a {
            display: block;
            text-decoration: none;
            color: #000000;
            font-family: 'Times New Roman', Times, serif;
            font-weight: normal;
            font-size: 24px;
            transition: color 0.2s ease;
            text-transform: none;
            white-space: nowrap;
        }

        nav a:hover {
            color: silver;
        }

        section {
            display: none;
            padding-top: 150px;
            min-height: calc(100vh - 80px - 40px);
            box-sizing: border-box;
        }

        section.active {
            display: block;
        }



        /* Basic responsive adjustments */
        @media (max-width: 768px) {
            .ids-stack { font-size: 20px; }
            nav { font-size: 20px; }
            .hero-wrapper {
                flex-direction: column;
            }
            nav, .ids-stack {
                flex: 0;
                min-height: auto;
                padding: 30px 20px;
            }
        }

        @media (max-width: 480px) {
            .ids-stack { font-size: 18px; }
            nav { font-size: 18px; }
        }

        @keyframes flashBg {
            0%, 49% { background-color: white; }
            50%, 100% { background-color: black; }
        }

        @keyframes flashText {
            0%, 49% { color: black; opacity: 1; }
            50%, 100% { color: white; opacity: 1; }
        }

        body {
            animation: flashBg 0.6s steps(1) infinite;
        }

        .scene-title {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 20vw;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: -0.02em;
            z-index: 2000;
            pointer-events: none;
            white-space: nowrap;
            animation: flashText 0.6s steps(1) infinite;
        }
    </style>
</head>
<body>
    <div class="scene-title">SCENE</div>
    <div class="wormhole-container">
        <canvas class="wormhole-canvas" id="wormholeCanvas"></canvas>
    </div>

    <div class="hero-wrapper">
        <nav>
            <a href="index.html" onclick="if(typeof showSection === 'function') showSection('home'); return false;">home</a>
            <a href="mixes.html">mixes</a>
            <a href="gallery.html">gallery</a>
        </nav>
        <div class="ids-stack">
            <span class="ids-line ids-mandarin">艾 迪 斯</span>
            <span class="ids-line ids-russian">И Д С</span>
            <span class="ids-line ids-arabic">ي د س</span>
            <span class="ids-line">⠊⠙⠎</span>
        </div>
    </div>

    <section id="home" class="active">
        <h2></h2>
        <p></p>
        <p></p>
    </section>



    <script>
        function showSection(id) {
            document.querySelectorAll("section").forEach((section) => {
                section.classList.remove("active");
            });
            document.getElementById(id).classList.add("active");
        }

        // Prefetch a few gallery images so they are cached before navigation
        function prefetchGalleryImages() {
            const galleryImages = [
                "Abuelas photos/000000010004.jpg",
                "Abuelas photos/000000010013.jpg",
                "Abuelas photos/000000010015.jpg"
            ];

            galleryImages.forEach((src) => {
                const img = new Image();
                img.src = src;
            });
        }

        // Initialize to show the home section on page load
        document.addEventListener("DOMContentLoaded", () => {
            showSection('home');
            initWormhole();
            prefetchGalleryImages();
        });

        // Strange attractor visualization (Sprott system)
        function initWormhole() {
            const canvas = document.getElementById('wormholeCanvas');
            const ctx = canvas.getContext('2d');

            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            // Multiple attractor streams
            const streams = [];
            const numStreams = 6;

            function resetStream(stream) {
                stream.x = Math.random() * 0.4 - 0.8;
                stream.y = Math.random() * 0.4 - 0.8;
                stream.age = 0;
                stream.maxAge = 8000 + Math.random() * 4000;
                stream.opacity = 0.12 + Math.random() * 0.15;
            }

            for (let i = 0; i < numStreams; i++) {
                const stream = { x: 0, y: 0, age: 0, maxAge: 0, opacity: 0 };
                resetStream(stream);
                stream.age = Math.floor(Math.random() * 4000); // stagger starts
                streams.push(stream);
            }

            // Sprott attractor coefficients (type C)
            function sprott(x, y) {
                const dt = 0.0012;
                const dx = y;
                const dy = -x + y * (0.9 - x * x * 1.2) - x * 0.4;
                return {
                    nx: x + dx * dt * 8,
                    ny: y + dy * dt * 8
                };
            }

            // Map attractor coords to canvas
            function toCanvas(x, y) {
                const cx = canvas.width / 2;
                const cy = canvas.height / 2;
                const scale = Math.min(canvas.width, canvas.height) * 0.28;
                return {
                    px: cx + x * scale,
                    py: cy + y * scale
                };
            }

            // Fade canvas slowly
            function draw() {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.018)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                for (let s = 0; s < streams.length; s++) {
                    const stream = streams[s];

                    // Step attractor multiple times per frame for speed
                    for (let step = 0; step < 12; step++) {
                        const { nx, ny } = sprott(stream.x, stream.y);
                        stream.x = nx;
                        stream.y = ny;
                        stream.age++;

                        const { px, py } = toCanvas(stream.x, stream.y);

                        // Fade in and out over lifetime
                        const lifeFraction = stream.age / stream.maxAge;
                        let alpha = stream.opacity;
                        if (lifeFraction < 0.05) alpha *= lifeFraction / 0.05;
                        if (lifeFraction > 0.85) alpha *= (1 - lifeFraction) / 0.15;

                        // Distance from center affects brightness
                        const dist = Math.sqrt(stream.x * stream.x + stream.y * stream.y);
                        const brightness = Math.max(30, Math.min(180, 80 + dist * 120));
                        const b = Math.floor(brightness);

                        ctx.fillStyle = `rgba(${b},${b},${b},${alpha})`;
                        ctx.beginPath();
                        ctx.arc(px, py, 0.6, 0, Math.PI * 2);
                        ctx.fill();
                    }

                    if (stream.age >= stream.maxAge) {
                        resetStream(stream);
                    }
                }

                requestAnimationFrame(draw);
            }

            draw();
        }
    </script>
    <script src="router.js"></script>
    <script data-init>
        // Reinitialize wormhole on navigation
        if (typeof initWormhole === 'function') {
            initWormhole();
        }
    </script>
</body>
</html>
