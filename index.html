<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Indistinct Scene</title>
    <link href="https://fonts.googleapis.com/css2?family=Cal+Sans&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Symbols&display=swap" rel="stylesheet">
    <style>
        body {
    margin: 0;
    padding: 80px 40px 40px 40px; /* more space at the top for fixed header */
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    color: black; /* Text color */
    overflow-x: hidden;
    text-transform: uppercase;

    /* --- BACKGROUND PROPERTIES --- */
    background-color: white; /* Plain white background */
    position: relative;
}
        
        .wormhole-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            opacity: 0.82;
            background: white;
        }

        .wormhole-canvas {
            width: 100%;
            height: 100%;
            image-rendering: auto;
        }
        

        @keyframes revolve {
            0% {
                transform: translate(-50%, -50%) rotateY(0deg);
            }
            100% {
                transform: translate(-50%, -50%) rotateY(360deg);
            }
        }

        .hero-wrapper {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1000;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 80px;
        }

        .ids-stack {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.25em;
            font-size: 24px;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            color: #FFE600;
            margin: 0;
            padding: 0;
        }

        .ids-line {
            display: block;
            line-height: 1.2;
            white-space: nowrap;
        }

        

        nav {
            font-size: 24px;
            font-weight: normal;
            font-family: 'Times New Roman', Times, serif;
            display: flex;
            flex-direction: column;
            gap: 15px;
            text-align: center;
            text-transform: none;
            z-index: 999;
        }

        nav a {
            display: block;
            text-decoration: none;
            color: #000000 !important;
            margin-bottom: 5px;
            transition: color 0.3s ease;
            text-transform: lowercase;
        }

        nav a:hover {
            color: red;
        }

        section {
            display: none;
            padding-top: 150px;
            min-height: calc(100vh - 80px - 40px);
            box-sizing: border-box;
        }

        section.active {
            display: block;
        }



        /* Basic responsive adjustments */
        @media (max-width: 768px) {
            .ids-stack { font-size: 20px; }
            nav { font-size: 20px; }
            body {
                padding: 60px 20px 20px 20px;
            }
        }

        @media (max-width: 480px) {
            .ids-stack { font-size: 18px; }
            nav { font-size: 18px; }
        }
    </style>
</head>
<body>
    <div class="wormhole-container">
        <canvas class="wormhole-canvas" id="wormholeCanvas"></canvas>
    </div>

    <div class="hero-wrapper">
        <nav>
            <a href="index.html" onclick="if(typeof showSection === 'function') showSection('home'); return false;">home</a>
            <a href="mixes.html">mixes</a>
            <a href="gallery.html">gallery</a>
        </nav>
        <div class="ids-stack">
            <span class="ids-line ids-mandarin">艾 迪 斯</span>
            <span class="ids-line ids-russian">И Д С</span>
            <span class="ids-line ids-korean">아 이 디 에 스</span>
            <span class="ids-line">⠊⠙⠎</span>
        </div>
    </div>

    <section id="home" class="active">
        <h2></h2>
        <p></p>
        <p></p>
    </section>



    <script>
        function showSection(id) {
            document.querySelectorAll("section").forEach((section) => {
                section.classList.remove("active");
            });
            document.getElementById(id).classList.add("active");
        }

        // Prefetch a few gallery images so they are cached before navigation
        function prefetchGalleryImages() {
            const galleryImages = [
                "Abuelas photos/000000010004.jpg",
                "Abuelas photos/000000010013.jpg",
                "Abuelas photos/000000010015.jpg"
            ];

            galleryImages.forEach((src) => {
                const img = new Image();
                img.src = src;
            });
        }

        // Initialize to show the home section on page load
        document.addEventListener("DOMContentLoaded", () => {
            showSection('home');
            initWormhole();
            prefetchGalleryImages();
        });

        // Moving water display with tiny dots
        function initWormhole() {
            const canvas = document.getElementById('wormholeCanvas');
            const ctx = canvas.getContext('2d');
            let time = 0;
            
            // Initialize particles for water effect
            const particles = [];
            const particleCount = 2000;
            
            function initParticles() {
                particles.length = 0;
                for (let i = 0; i < particleCount; i++) {
                    particles.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        vx: (Math.random() - 0.5) * 0.5,
                        vy: (Math.random() - 0.5) * 0.5,
                        life: Math.random(),
                        baseLife: Math.random() * 0.5 + 0.5
                    });
                }
            }

            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                initParticles();
            }
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            function drawWaterDisplay() {
                // Very light fade to create motion trails
                ctx.fillStyle = 'rgba(255, 255, 255, 0.08)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                time += 0.016; // ~60fps

                const cx = canvas.width / 2;
                const cy = canvas.height / 2;

                // Update and draw particles
                for (let i = 0; i < particles.length; i++) {
                    const p = particles[i];

                    // Fluid wave influence
                    const waveX = Math.sin(time * 0.3 + p.y * 0.005) * 0.08;
                    const waveY = Math.cos(time * 0.25 + p.x * 0.004) * 0.08;

                    // Gentle pull toward center
                    const dx = cx - p.x;
                    const dy = cy - p.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const maxDist = Math.min(canvas.width, canvas.height) * 0.6;
                    
                    if (dist > maxDist) {
                        p.vx += (dx / dist) * 0.002;
                        p.vy += (dy / dist) * 0.002;
                    }

                    // Apply wave forces
                    p.vx += waveX * 0.01;
                    p.vy += waveY * 0.01;

                    // Damping
                    p.vx *= 0.99;
                    p.vy *= 0.99;

                    // Update position
                    p.x += p.vx;
                    p.y += p.vy;

                    // Wrap around edges smoothly
                    if (p.x < 0) p.x = canvas.width;
                    if (p.x > canvas.width) p.x = 0;
                    if (p.y < 0) p.y = canvas.height;
                    if (p.y > canvas.height) p.y = 0;

                    // Calculate distance from center for brightness
                    const dx2 = cx - p.x;
                    const dy2 = cy - p.y;
                    const distFromCenter = Math.sqrt(dx2 * dx2 + dy2 * dy2);
                    const normalizedDist = distFromCenter / maxDist;

                    // Brightness varies with distance and time
                    let brightness = Math.max(0.1, 0.8 - normalizedDist * 0.5);
                    brightness += Math.sin(time * 0.5 + i) * 0.15; // Subtle pulse
                    brightness = Math.max(0.05, brightness);

                    // Draw tiny dot
                    const gray = Math.floor(brightness * 255);
                    ctx.fillStyle = `rgba(${gray}, ${gray}, ${gray}, 0.9)`;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 0.5, 0, Math.PI * 2);
                    ctx.fill();
                }

                requestAnimationFrame(drawWaterDisplay);
            }

            drawWaterDisplay();
        }
    </script>
    <script src="router.js"></script>
    <script data-init>
        // Reinitialize wormhole on navigation
        if (typeof initWormhole === 'function') {
            initWormhole();
        }
    </script>
</body>
</html>
