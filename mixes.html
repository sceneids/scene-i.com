<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <style>
        html,
        body {
            margin: 0;
            min-height: 100%;
        }

        body {
            background: #fff;
            color: #000;
            font-family: "Times New Roman", Times, serif;
            font-weight: 300;
        }

        .site-home-i {
            position: fixed;
            left: 50%;
            top: 50%;
            z-index: 10;
            color: #000;
            font-size: 18px;
            line-height: 1;
            text-decoration: none;
            text-transform: lowercase;
            transform: translate(-50%, -50%);
        }

        .site-home-i:hover,
        .site-home-i:focus-visible {
            color: #000;
            background: #fff;
            mix-blend-mode: difference;
            text-decoration: none;
        }

        #mix-dropdowns {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            max-width: min(440px, calc(100vw - 80px));
        }

        #mix-dropdowns details {
            font-family: "Times New Roman", Times, serif;
            font-size: 13px;
            color: #000;
            width: 100%;
        }

        #mix-dropdowns summary {
            cursor: pointer;
            list-style: none;
        }

        #mix-dropdowns summary::-webkit-details-marker {
            display: none;
        }

        #mix-dropdowns .sc-wrap {
            margin-top: 10px;
            width: 100%;
        }

        #mix-dropdowns iframe {
            width: 100%;
            height: 166px;
            border: none;
            display: block;
        }
    </style>
</head>
<body>
    <a class="site-home-i" href="index.html">i</a>

    <div id="mix-dropdowns">
        <details>
            <summary>03-06-2026</summary>
            <div class="sc-wrap">
                <iframe title="SoundCloud 03-06-2026" allow="autoplay"
                    src="https://w.soundcloud.com/player/?url=https%3A%2F%2Fsoundcloud.com%2Findistinctscene300%2Fids-radio-w-saintgermane&amp;color=%23000000&amp;auto_play=false&amp;hide_related=true&amp;show_comments=false&amp;show_user=false&amp;show_reposts=false"></iframe>
            </div>
        </details>
        <details>
            <summary>10-03-2025</summary>
            <div class="sc-wrap">
                <iframe title="SoundCloud 10-03-2025" allow="autoplay"
                    src="https://w.soundcloud.com/player/?url=https%3A%2F%2Fsoundcloud.com%2Findistinctscene0%2Fsaint-germane-w-hnko-30102025&amp;color=%23000000&amp;auto_play=false&amp;hide_related=true&amp;show_comments=false&amp;show_user=false&amp;show_reposts=false"></iframe>
            </div>
        </details>
    </div>
</body>
</html>
