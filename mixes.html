<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mixes</title>
  <style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background-color: #000;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    overflow: hidden;
}

.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    grid-template-rows: repeat(2, 1fr);
    width: 100vw;
    height: 100vh;
    gap: 2px;
    background-color: #111;
}

.mix-box {
    position: relative;
    overflow: hidden;
    cursor: pointer;
    background-color: #1a1a1a;
}

.mix-box img.mix-cover {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    opacity: 0.85;
    transition: opacity 0.3s ease;
}

.mix-box:hover img.mix-cover {
    opacity: 1;
}

.mix-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 10px 12px;
    background: linear-gradient(transparent, rgba(0,0,0,0.75));
    display: flex;
    align-items: center;
    gap: 8px;
}

.play-btn {
    width: 28px;
    height: 28px;
    border: 2px solid #fff;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    cursor: pointer;
    background: transparent;
    transition: background 0.2s;
}

.play-btn:hover {
    background: rgba(255,255,255,0.2);
}

.play-btn svg {
    width: 10px;
    height: 10px;
    fill: #fff;
    margin-left: 2px;
}

.mix-title {
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    line-height: 1.2;
}

.sc-player {
    display: none;
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    z-index: 9999;
}

.sc-player.active {
    display: block;
}

.sc-player iframe {
    width: 100%;
    height: 80px;
    border: none;
}
  </style>
</head>
<body>
<div class="grid" id="mixGrid"></div>

<div class="sc-player" id="scPlayer">
    <iframe id="scIframe" allow="autoplay"></iframe>
</div>

<script>
const mixes = [
    {
        url: "https://soundcloud.com/indistinctscene0/saint-germane-w-hnko-30102025",
        title: "Saint Germane w/ HNKO"
    }
    // Add more mixes here as objects with url and title
];

const grid = document.getElementById('mixGrid');
const scPlayer = document.getElementById('scPlayer');
const scIframe = document.getElementById('scIframe');

// Fill all 4 slots
for (let i = 0; i < 4; i++) {
    const mix = mixes[i];
    const box = document.createElement('div');
    box.className = 'mix-box';

    if (mix) {
        box.innerHTML = `
            <img class="mix-cover" src="" alt="${mix.title}" />
            <div class="mix-overlay">
                <div class="play-btn" data-url="${mix.url}">
                    <svg viewBox="0 0 10 10"><polygon points="2,1 9,5 2,9"/></svg>
                </div>
                <span class="mix-title">${mix.title}</span>
            </div>
        `;

        // Load cover from SoundCloud oEmbed
        const img = box.querySelector('img');
        fetch(`https://soundcloud.com/oembed?format=json&url=${encodeURIComponent(mix.url)}`)
            .then(r => r.json())
            .then(data => {
                if (data.thumbnail_url) {
                    img.src = data.thumbnail_url.replace(/t\d+x\d+/, 't500x500');
                }
            })
            .catch(() => {});

        // Play on click
        box.querySelector('.play-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            const trackUrl = e.currentTarget.dataset.url;
            scIframe.src = `https://w.soundcloud.com/player/?url=${encodeURIComponent(trackUrl)}&auto_play=true&color=%23000000&hide_related=true&show_comments=false&show_user=false&show_reposts=false`;
            scPlayer.classList.add('active');
        });
    }

    grid.appendChild(box);
}
</script>
<script src="router.js"></script>
</body>
</html>
